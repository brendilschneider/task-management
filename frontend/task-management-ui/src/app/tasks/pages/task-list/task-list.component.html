<div class="task-container">
  <h2>Gestor de Tareas</h2>
  
  <!-- Formulario -->
  <app-task-form (taskCreated)="onTaskCreated($event)"></app-task-form>

  <hr class="divider" />

  <!-- Listado -->
  <h3>Mis Tareas</h3>

  @if (tasks().length === 0) {
    <p class="empty-state">No hay tareas pendientes.</p>
  } @else {
    <ul class="task-list">
      @for (task of tasks(); track task.id) {
        <li class="task-item" [class.completed]="task.isCompleted">
          <div class="task-info">
            <span class="task-title">{{ task.title }}</span>
            @if (task.description) {
              <p class="task-desc">{{ task.description }}</p>
            }
          </div>
          <div class="task-actions">
            <button 
              class="btn-toggle" 
              (click)="toggleTask(task)">
              {{ task.isCompleted ? 'Desmarcar' : 'Completar' }}
            </button>
            <button 
              class="btn-delete" 
              (click)="deleteTask(task.id)">
              Eliminar
            </button>
          </div>
        </li>
      }
    </ul>
  }
</div>
